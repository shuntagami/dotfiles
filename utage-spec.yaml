openapi: 3.0.3
info:
  title: UTAGE API
  description: |
    UTAGEのパブリックAPIです。ファネル、配信アカウント、シナリオ、メディアなどのリソースをプログラムから操作できます。

    ## 認証
    すべてのリクエストにAPIキーによるBearer認証が必要です（要素タイプエンドポイントを除く）。

    ```
    Authorization: Bearer {api_key}
    ```

    APIキーはUTAGE管理画面から発行できます。

    ## レート制限
    リクエスト数には以下の制限があります。

    | 分間上限 | 日間上限 |
    |----------|----------|
    | 60リクエスト/分 | 10,000リクエスト/日 |

    レスポンスヘッダーで現在の使用状況を確認できます。

    | ヘッダー | 説明 |
    |----------|------|
    | X-RateLimit-Limit | 分間の上限値 |
    | X-RateLimit-Remaining | 分間の残りリクエスト数 |
    | X-RateLimit-Reset | リセットまでの秒数 |

    上限を超えた場合は `429 Too Many Requests` が返されます。

    ## エラーレスポンス
    エラー時は以下の形式で返されます。

    ```json
    {
      "error": {
        "code": "error_code",
        "message": "エラーメッセージ"
      }
    }
    ```
  version: '1.0'
  contact:
    name: UTAGE サポート
servers:
  - url: https://api.utage-system.com/v1
    description: UTAGE API
security:
  - BearerAuth: []
tags:
  - name: ファネル
    description: ファネルの作成・更新・一覧取得
  - name: ステップ
    description: ファネル内のステップの作成・更新・並び替え
  - name: ページ
    description: ステップ内のページの作成・更新・取得・削除
  - name: 配信アカウント
    description: 配信アカウントの作成・一覧取得
  - name: シナリオ
    description: シナリオの作成・一覧取得
  - name: メディア
    description: 動画・音声の一覧取得
  - name: 要素タイプ
    description: ファネルページの要素タイプ定義の取得（認証不要）
paths:
  /funnels:
    get:
      operationId: listFunnels
      summary: ファネル一覧
      description: ファネルの一覧を取得します。名前で部分一致検索が可能です。
      tags:
        - ファネル
      parameters:
        - name: name
          in: query
          description: ファネル名で部分一致検索
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: ファネル一覧
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Funnel'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    post:
      operationId: createFunnel
      summary: ファネル作成
      description: 新しいファネルを作成します。
      tags:
        - ファネル
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  maxLength: 255
                  description: ファネル名
      responses:
        '201':
          description: 作成されたファネル
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Funnel'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /funnels/{funnel_id}:
    put:
      operationId: updateFunnel
      summary: ファネル更新
      description: ファネルの情報を更新します。JS設定は全ページ共通で適用されます。
      tags:
        - ファネル
      parameters:
        - $ref: '#/components/parameters/FunnelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  maxLength: 255
                  description: ファネル名
                memo:
                  type: string
                  description: メモ
                js_head:
                  type: string
                  description: head内に挿入するJavaScript（全ページ共通。GTMタグ等）
                js_body_top:
                  type: string
                  description: body直後に挿入するJavaScript（全ページ共通）
                js_body:
                  type: string
                  description: body末尾に挿入するJavaScript（全ページ共通）
      responses:
        '200':
          description: 更新されたファネル
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FunnelDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /funnels/{funnel_id}/steps:
    get:
      operationId: listSteps
      summary: ステップ一覧
      description: 指定ファネル配下のステップ一覧を取得します。各ステップに公開URLを含みます。
      tags:
        - ステップ
      parameters:
        - $ref: '#/components/parameters/FunnelId'
      responses:
        '200':
          description: ステップ一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Step'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    post:
      operationId: createStep
      summary: ステップ作成
      description: 指定ファネルに新しいステップを作成します。
      tags:
        - ステップ
      parameters:
        - $ref: '#/components/parameters/FunnelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  maxLength: 255
                  description: ステップ名
      responses:
        '201':
          description: 作成されたステップ
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Step'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /funnels/{funnel_id}/steps/{step_id}:
    put:
      operationId: updateStep
      summary: ステップ更新
      description: ステップの名前を更新します。
      tags:
        - ステップ
      parameters:
        - $ref: '#/components/parameters/FunnelId'
        - $ref: '#/components/parameters/StepId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  maxLength: 255
                  description: ステップ名
      responses:
        '200':
          description: 更新されたステップ
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/StepWithoutUrl'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /funnels/{funnel_id}/steps/reorder:
    put:
      operationId: reorderSteps
      summary: ステップ並び替え
      description: ステップの表示順を変更します。全ステップIDを含める必要があります。
      tags:
        - ステップ
      parameters:
        - $ref: '#/components/parameters/FunnelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - step_ids
              properties:
                step_ids:
                  type: array
                  items:
                    type: string
                  description: 並び替え後の順序で全ステップIDを指定
      responses:
        '200':
          description: 並び替え後のステップ一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StepWithoutUrl'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /funnels/{funnel_id}/steps/{step_id}/pages:
    get:
      operationId: listPages
      summary: ページ一覧
      description: 指定ステップ配下のページ一覧を取得します。各ページにcontent_type、step_url、page_urlを含みます。
      tags:
        - ページ
      parameters:
        - $ref: '#/components/parameters/FunnelId'
        - $ref: '#/components/parameters/StepId'
      responses:
        '200':
          description: ページ一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PageSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    post:
      operationId: createPage
      summary: ページ作成
      description: |
        ステップに新しいページを作成します。

        `content_type` で2つの形式を選択できます。
        - **elements**（デフォルト）: 要素の階層構造（section > row > col > コンテンツ要素）で作成
        - **raw_html**: HTML直接入力で作成（html/head/bodyタグ必須、最大4MB）

        elements形式の場合は、先に要素タイプ定義（GET /element-types/funnel）を取得して要素構造を確認してください。
      tags:
        - ページ
      parameters:
        - $ref: '#/components/parameters/FunnelId'
        - $ref: '#/components/parameters/StepId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PageCreateRequest'
      responses:
        '201':
          description: 作成されたページ
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PageSummaryWithIds'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /funnels/{funnel_id}/steps/{step_id}/pages/{page_id}:
    get:
      operationId: getPage
      summary: ページ詳細取得
      description: |
        ページの詳細情報を取得します。要素構造（elements）またはHTML（html_source）を含みます。

        ページ更新前に必ずこのエンドポイントで現在値を取得してください。
      tags:
        - ページ
      parameters:
        - $ref: '#/components/parameters/FunnelId'
        - $ref: '#/components/parameters/StepId'
        - $ref: '#/components/parameters/PageId'
      responses:
        '200':
          description: ページ詳細
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PageDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    put:
      operationId: updatePage
      summary: ページ更新
      description: |
        ページを更新します。変更箇所以外も全て含めて送信してください。

        **重要:** 更新前に必ず GET で現在値を取得し、変更箇所のみ修正して送信してください。
        未指定のフィールドはnullに上書きされます。

        `content_type` は作成後に変更できません。異なる値を指定すると400エラーになります。
      tags:
        - ページ
      parameters:
        - $ref: '#/components/parameters/FunnelId'
        - $ref: '#/components/parameters/StepId'
        - $ref: '#/components/parameters/PageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PageUpdateRequest'
      responses:
        '200':
          description: 更新されたページ
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PageDetail'
        '400':
          description: content_typeの変更など不正なリクエスト
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    delete:
      operationId: deletePage
      summary: ページ削除
      description: ページを削除します。
      tags:
        - ページ
      parameters:
        - $ref: '#/components/parameters/FunnelId'
        - $ref: '#/components/parameters/StepId'
        - $ref: '#/components/parameters/PageId'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      deleted:
                        type: boolean
                        example: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /accounts:
    get:
      operationId: listAccounts
      summary: アカウント一覧
      description: 配信アカウントの一覧を取得します。タイプや名前で絞り込みが可能です。
      tags:
        - 配信アカウント
      parameters:
        - name: type
          in: query
          description: アカウントタイプで絞り込み
          schema:
            type: string
            enum:
              - mail
              - line
              - mail_line
        - name: name
          in: query
          description: アカウント名で部分一致検索
          schema:
            type: string
      responses:
        '200':
          description: アカウント一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    post:
      operationId: createAccount
      summary: アカウント作成
      description: |
        新しい配信アカウントを作成します。
      tags:
        - 配信アカウント
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
              properties:
                name:
                  type: string
                  maxLength: 255
                  description: アカウント名
                type:
                  type: string
                  enum:
                    - mail
                    - line
                    - mail_line
                  description: |
                    アカウントタイプ
                    - `mail`: メール配信
                    - `line`: LINE配信
                    - `mail_line`: メール + LINE配信
      responses:
        '201':
          description: 作成されたアカウント
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /accounts/{account_id}/scenarios:
    get:
      operationId: listScenarios
      summary: シナリオ一覧
      description: 指定アカウント配下のシナリオ一覧を取得します。
      tags:
        - シナリオ
      parameters:
        - $ref: '#/components/parameters/AccountId'
        - name: title
          in: query
          description: シナリオ名で部分一致検索
          schema:
            type: string
      responses:
        '200':
          description: シナリオ一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Scenario'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
    post:
      operationId: createScenario
      summary: シナリオ作成
      description: |
        指定アカウントに新しいシナリオを作成します。
      tags:
        - シナリオ
      parameters:
        - $ref: '#/components/parameters/AccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                  maxLength: 255
                  description: シナリオ名
                open_title:
                  type: string
                  maxLength: 255
                  description: 公開用タイトル
      responses:
        '201':
          description: 作成されたシナリオ
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Scenario'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /media/videos:
    get:
      operationId: listVideos
      summary: 動画一覧
      description: 動画の一覧を取得します。キーワードやフォルダで絞り込みが可能です。
      tags:
        - メディア
      parameters:
        - name: keyword
          in: query
          description: 名前で部分一致検索
          schema:
            type: string
        - name: folder_id
          in: query
          description: フォルダIDで絞り込み
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: 動画一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Video'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /media/videos/folders:
    get:
      operationId: listVideoFolders
      summary: 動画フォルダ一覧
      description: 動画フォルダの一覧を取得します。
      tags:
        - メディア
      responses:
        '200':
          description: 動画フォルダ一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MediaFolder'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /media/audios:
    get:
      operationId: listAudios
      summary: 音声一覧
      description: 音声の一覧を取得します。キーワードやフォルダで絞り込みが可能です。
      tags:
        - メディア
      parameters:
        - name: keyword
          in: query
          description: 名前で部分一致検索
          schema:
            type: string
        - name: folder_id
          in: query
          description: フォルダIDで絞り込み
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: 音声一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Audio'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /media/audios/folders:
    get:
      operationId: listAudioFolders
      summary: 音声フォルダ一覧
      description: 音声フォルダの一覧を取得します。
      tags:
        - メディア
      responses:
        '200':
          description: 音声フォルダ一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MediaFolder'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
  /element-types/funnel:
    get:
      operationId: listFunnelElementTypes
      summary: 要素タイプ一覧
      description: |
        ファネルページの要素タイプ一覧を取得します（認証不要）。

        デフォルトでは基本カテゴリ（layout, content, other）のみ返します。
        決済・イベント・フォーム・ウェビナー要素が必要な場合は `include` で指定してください。
      tags:
        - 要素タイプ
      security: []
      parameters:
        - name: include
          in: query
          description: |
            拡張カテゴリのカンマ区切り。
            - `form`: 登録フォーム（LP・メルマガ登録・資料請求に必要）
            - `payment`: 決済（商品販売ページに必要）
            - `event`: イベント申込（説明会・セミナー・個別相談の申込ページに必要）
            - `webinar`: 自動ウェビナー
          schema:
            type: string
          example: form,payment
      responses:
        '200':
          description: 要素タイプ定義の配列
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: 要素タイプ定義の配列
                    items:
                      type: object
  /element-types/funnel/properties:
    get:
      operationId: getFunnelElementTypeProperties
      summary: 要素プロパティ定義
      description: >
        指定した要素タイプのプロパティ定義を取得します（認証不要）。


        レスポンスには以下が含まれます。

        - `global_common_properties`: 全要素共通のプロパティ

        - `content_common_properties`:
        コンテンツ要素共通のプロパティ（padding/border/background）

        - 個別要素の `properties`: その要素固有のプロパティ
      tags:
        - 要素タイプ
      security: []
      parameters:
        - name: types
          in: query
          required: true
          description: '要素タイプ名のカンマ区切り（例: text,button,image）'
          schema:
            type: string
          example: text,button,image
      responses:
        '200':
          description: 要素プロパティ定義
          content:
            application/json:
              schema:
                type: object
                properties:
                  global_common_properties:
                    type: object
                    description: 全要素共通のプロパティ定義
                  content_common_properties:
                    type: object
                    description: コンテンツ要素共通のプロパティ定義（padding/border/background）
                  data:
                    type: array
                    description: 要素タイプごとのプロパティ定義
                    items:
                      type: object
        '422':
          $ref: '#/components/responses/ValidationError'
